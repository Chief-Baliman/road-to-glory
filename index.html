<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road to Glory</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
    }

    #game {
      position: relative;
      width: 600px;
      overflow: hidden;
    }

    #road {
      width: 100%;
      display: block;
    }

    #title {
      position: absolute;
      top: 26px;
      left: 30px;
      font-size: 42px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 14px rgba(0,0,0,.55);
      z-index: 7;
      line-height: 1;
    }

    #player {
      position: absolute;
      top: 84px;
      left: 30px;
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 4px 12px rgba(0,0,0,.55);
      z-index: 7;
      line-height: 1.1;
      max-width: 360px;
      word-break: break-word;
    }

    #jackpot {
      position: absolute;
      top: 126px;
      left: 30px;
      font-size: 24px;
      font-weight: 800;
      color: #e9a846;
      text-shadow: 0 4px 12px rgba(0,0,0,.55);
      z-index: 7;
      line-height: 1.1;
      max-width: 360px;
      word-break: break-word;
    }

    #trainer {
      position: absolute;
      width: 112px;
      height: auto;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      transition:
        left .28s linear,
        top .28s linear,
        transform .28s linear,
        opacity .25s ease-in-out;
      z-index: 6;
      image-rendering: pixelated;
      opacity: 0;
      pointer-events: none;
    }

    #panel {
      margin-top: 18px;
      background: rgba(20,20,20,.92);
      padding: 14px;
      border-radius: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: 0;
      border-radius: 10px;
      background: #f3f3f3;
      color: #111;
    }

    button:hover {
      filter: brightness(0.96);
    }

    .hidden-ui #panel {
      display: none;
    }
  </style>
</head>
<body>

  <div id="game">
    <img id="road" src="road.png" alt="Road to Glory">
    <div id="title">Road to Glory</div>
    <div id="player">Kein Spieler</div>
    <div id="jackpot">Champion Jackpot: 0 €</div>
    <img id="trainer" src="trainer.png" alt="Trainer">
  </div>

  <div id="panel">
    <button onclick="challengerTakesOver()">Herausforderer übernimmt</button>
    <button onclick="defendRoad()">Road verteidigt</button>
    <button onclick="addJackpot()">Jackpot +1 €</button>
    <button onclick="resetJackpot()">Jackpot Reset</button>
    <button onclick="resetGame()">Reset</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5kq-HiCkVroQLCwwVc24C8XYPJTZvegM",
      authDomain: "queue-tracker-3fa3c.firebaseapp.com",
      databaseURL: "https://queue-tracker-3fa3c-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "queue-tracker-3fa3c",
      storageBucket: "queue-tracker-3fa3c.firebasestorage.app",
      messagingSenderId: "132132188124",
      appId: "1:132132188124:web:ecc130f7ee7ac9d61be919",
      measurementId: "G-3QBWJHGDXG"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, "streamTools/roadToGlory/state");

    const params = new URLSearchParams(window.location.search);
    const overlayMode = params.get("view") === "overlay";

    if (overlayMode) {
      document.body.classList.add("hidden-ui");
    }

    const trainerEl = document.getElementById("trainer");
    const playerEl = document.getElementById("player");
    const jackpotEl = document.getElementById("jackpot");

    const pos = {
      p1: { top: 770, left: 82, scale: 1.18 },
      p2: { top: 605, left: 505, scale: 1.05 },
      p3: { top: 535, left: 190, scale: 0.96 },
      p4: { top: 390, left: 315, scale: 0.84 },
      p5: { top: 250, left: 395, scale: 0.73 }
    };

    const paths = {
      startTo2: [
        { top: 770, left: 82, scale: 1.18 },
        { top: 725, left: 118, scale: 1.15 },
        { top: 690, left: 170, scale: 1.12 },
        { top: 660, left: 245, scale: 1.10 },
        { top: 635, left: 345, scale: 1.08 },
        { top: 617, left: 435, scale: 1.06 },
        { top: 605, left: 505, scale: 1.05 }
      ],
      p2To3: [
        { top: 610, left: 470, scale: 1.03 },
        { top: 605, left: 410, scale: 1.01 },
        { top: 595, left: 340, scale: 0.99 },
        { top: 580, left: 280, scale: 0.98 },
        { top: 560, left: 225, scale: 0.97 },
        { top: 535, left: 190, scale: 0.96 }
      ],
      p3To4: [
        { top: 520, left: 210, scale: 0.94 },
        { top: 495, left: 235, scale: 0.92 },
        { top: 465, left: 260, scale: 0.90 },
        { top: 435, left: 285, scale: 0.88 },
        { top: 410, left: 302, scale: 0.86 },
        { top: 390, left: 315, scale: 0.84 }
      ],
      p4To5: [
        { top: 375, left: 332, scale: 0.82 },
        { top: 350, left: 350, scale: 0.80 },
        { top: 322, left: 366, scale: 0.78 },
        { top: 295, left: 380, scale: 0.76 },
        { top: 270, left: 390, scale: 0.74 },
        { top: 250, left: 395, scale: 0.73 }
      ]
    };

    let stage = 0;
    let playerName = "";
    let jackpot = 0;
    let isAnimating = false;

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function ensureStateExists() {
      const snapshot = await get(stateRef);

      if (!snapshot.exists()) {
        await update(stateRef, {
          stage: 0,
          playerName: "",
          jackpot: 0,
          updatedAt: Date.now()
        });
      }
    }

    async function saveState() {
      await update(stateRef, {
        stage,
        playerName,
        jackpot,
        updatedAt: Date.now()
      });
    }

    function renderName() {
      playerEl.textContent = playerName || "Kein Spieler";
    }

    function renderJackpot() {
      jackpotEl.textContent = "Champion Jackpot: " + jackpot + " €";
    }

    function setTrainer(point) {
      trainerEl.style.left = point.left + "px";
      trainerEl.style.top = point.top + "px";
      trainerEl.style.transform = `translate(-50%, -50%) scale(${point.scale})`;
      trainerEl.style.opacity = "1";
    }

    async function animatePath(points, stepDelay = 180) {
      for (const point of points) {
        setTrainer(point);
        await wait(stepDelay);
      }
    }

    function hideTrainer() {
      trainerEl.style.opacity = "0";
      trainerEl.style.left = "-200px";
      trainerEl.style.top = "-200px";
    }

    function renderStaticStage() {
      renderName();
      renderJackpot();

      if (!playerName || stage === 0) {
        hideTrainer();
        return;
      }

      if (stage === 1) setTrainer(pos.p1);
      if (stage === 2) setTrainer(pos.p2);
      if (stage === 3) setTrainer(pos.p3);
      if (stage === 4) setTrainer(pos.p4);
      if (stage === 5) setTrainer(pos.p5);
    }

    async function addJackpot() {
      jackpot += 1;
      await saveState();
    }

    async function resetJackpot() {
      jackpot = 0;
      await saveState();
    }

    async function challengerTakesOver() {
      if (isAnimating) return;

      const newName = prompt("Neuer Spieler Name?");
      if (!newName) return;

      const cleanName = newName.trim();
      if (!cleanName) return;

      isAnimating = true;

      playerName = cleanName;
      renderName();

      stage = 1;
      await saveState();
      setTrainer(pos.p1);

      await wait(220);

      stage = 2;
      await saveState();
      await animatePath(paths.startTo2);

      isAnimating = false;
    }

    async function defendRoad() {
      if (isAnimating) return;

      if (!playerName || stage === 0) {
        alert("Es ist noch kein Spieler auf der Road.");
        return;
      }

      isAnimating = true;

      if (stage === 2) {
        stage = 3;
        await saveState();
        await animatePath(paths.p2To3);
        isAnimating = false;
        return;
      }

      if (stage === 3) {
        stage = 4;
        await saveState();
        await animatePath(paths.p3To4);
        isAnimating = false;
        return;
      }

      if (stage === 4) {
        stage = 5;
        await saveState();
        await animatePath(paths.p4To5);
        isAnimating = false;
        return;
      }

      if (stage === 5) {
        await wait(140);
        alert(playerName + " gewinnt die TTB + " + jackpot + " € Champion Jackpot!");
        jackpot = 0;
        await saveState();
        await resetGame();
        isAnimating = false;
        return;
      }

      isAnimating = false;
    }

    async function resetGame() {
      stage = 0;
      playerName = "";
      await saveState();
      renderStaticStage();
    }

    onValue(stateRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      stage = Number(data.stage || 0);
      playerName = data.playerName || "";
      jackpot = Number(data.jackpot || 0);

      renderStaticStage();
    });

    await ensureStateExists();
    renderStaticStage();

    window.challengerTakesOver = challengerTakesOver;
    window.defendRoad = defendRoad;
    window.addJackpot = addJackpot;
    window.resetJackpot = resetJackpot;
    window.resetGame = resetGame;
  </script>

</body>
</html>
